# name pins the compose project to the shared server so the container and volume
# names are stable regardless of the working directory, and every project's
# identical compose reuses the same shared-mongo container rather than spawning
# its own (a git worktree is named after a number, which would otherwise leak
# into the names).
name: shared-mongo

services:
  mongo:
    image: mongo:8.0
    container_name: shared-mongo
    # --replSet is mandatory: the shared server models a single node replica set
    # so change streams and transactions work. bind_ip_all lets the host reach it.
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - data:/data/db

volumes:
  # fixed name so the shared volume is stable across projects and worktrees
  data:
    name: shared-mongo-data
